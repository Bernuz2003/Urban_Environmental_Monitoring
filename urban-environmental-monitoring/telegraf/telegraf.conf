[agent]
  interval = "10s"
  flush_interval = "5s"
  metric_batch_size = 5000
  metric_buffer_limit = 50000
  omit_hostname = true

[[inputs.kafka_consumer]]
  brokers = ["kafka:19092"]
  kafka_version = "4.0.0"
  topics = ["urban.telemetry"]
  consumer_group = "urban-telegraf"
  offset = "oldest"
  startup_error_behavior = "retry"
  data_format = "influx"
  max_message_len = 1000000

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "$INFLUX_TOKEN"
  organization = "$INFLUX_ORG"
  bucket = "urban_raw"
  content_encoding = "gzip"
